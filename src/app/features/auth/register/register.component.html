<div class="auth-container">
  <div class="auth-card">
    <h2>Register</h2>

    <form (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>Name</label>
        <input type="text" [(ngModel)]="form.name" name="name"
               placeholder="Your full name" required />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="form.email" name="email"
               placeholder="your@email.com" required />
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" [(ngModel)]="form.phonenumber" name="phonenumber"
               placeholder="+1234567890" required />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="form.password" name="password"
               placeholder="Password" required />
      </div>

      <div class="form-group">
        <label>Location</label>
        <input type="text" [(ngModel)]="form.location" name="location"
               placeholder="City, Country" required />
      </div>

      <p class="success" *ngIf="success">{{ success }}</p>
      <p class="error"   *ngIf="error">{{ error }}</p>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Registering...' : 'Register' }}
      </button>

    </form>

    <p class="switch-link">
      Already have an account? <a routerLink="/login">Login</a>
    </p>
  </div>
</div>
